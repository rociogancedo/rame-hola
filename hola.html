<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rocío Gancedo — Ramé Advisory</title>
  <meta name="description" content="Estrategia y acompañamiento para líderes y dueños de empresa." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C09A5A;
      --gold-light: #C9A96E;
      --dark: #0a0a0f;
      --dark-mid: #12121a;
      --text: #e8e2d8;
      --text-muted: rgba(232,226,216,0.55);
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px 20px;
      position: relative;
      overflow: hidden;
    }

    /* ── Cosmos background ── */
    .cosmos {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(192,154,90,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 60% 80% at 80% 100%, rgba(192,154,90,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #0d0d16 0%, #060609 100%);
    }

    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);
      animation: twinkle var(--dur) ease-in-out infinite var(--delay);
    }

    @keyframes twinkle {
      0%, 100% { opacity: var(--min-op); transform: scale(1); }
      50% { opacity: var(--max-op); transform: scale(1.4); }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Photo ── */
    .photo-wrap {
      position: relative;
      margin-bottom: 24px;
    }

    .photo-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: conic-gradient(from 180deg, var(--gold), var(--gold-light), transparent 60%, var(--gold));
      opacity: 0.6;
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .photo-bg {
      position: relative;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--dark-mid);
      border: 2px solid rgba(192,154,90,0.3);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    /* Placeholder initials if image fails */
    .photo-initials {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      font-weight: 300;
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    /* ── Name & title ── */
    .name {
      font-family: 'Fraunces', serif;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 0.01em;
      text-align: center;
      line-height: 1.15;
      margin-bottom: 6px;
    }

    .name em {
      font-style: italic;
      color: var(--gold-light);
    }

    .role {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 4px;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto;
      opacity: 0.6;
    }

    /* ── Links ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.02em;
      border: 1px solid rgba(192,154,90,0.15);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(8px);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }

    .link-btn:nth-child(1) { animation-delay: 0.15s; }
    .link-btn:nth-child(2) { animation-delay: 0.22s; }
    .link-btn:nth-child(3) { animation-delay: 0.29s; }
    .link-btn:nth-child(4) { animation-delay: 0.36s; }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(192,154,90,0.08), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .link-btn:hover::before,
    .link-btn:active::before { opacity: 1; }

    .link-btn:hover,
    .link-btn:active {
      border-color: rgba(192,154,90,0.45);
      transform: translateY(-1px);
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(192,154,90,0.1);
      border: 1px solid rgba(192,154,90,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 16px;
      height: 16px;
    }

    .link-label {
      flex: 1;
    }

    .link-label-main {
      display: block;
      font-weight: 500;
    }

    .link-label-sub {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 28px;
      text-align: center;
      animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.5s both;
    }

    .tagline {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .brand {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(192,154,90,0.4);
      margin-top: 6px;
    }
  </style>
</head>

        width:${size}px; height:${size}px;
        top:${Math.random()*100}%; left:${Math.random()*100}%;

        --delay:-${(Math.random()*6).toFixed(1)}s;

      `;
